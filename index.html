<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>OSCARLOCATOR</title>

<!-- PWA -->
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#0d1b16" />

<!-- iOS standalone web app -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="OSCARLOCATOR" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
html,body{margin:0;padding:0;background:#0d1b16;}
#root{min-height:100vh;}
.ol-root{
  --ink:#0a1612; --paper:#0d1b16; --panel:#102420; --line:#1d3b32;
  --green:#41e0a3; --amber:#f0b429; --dim:#5f8478; --txt:#cde6dc;
  font-family:'IBM Plex Sans',ui-sans-serif,system-ui,sans-serif;
  background:var(--paper); color:var(--txt); min-height:100vh;
  -webkit-font-smoothing:antialiased;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
.ol-root *{box-sizing:border-box;}
.mono{font-family:'IBM Plex Mono',ui-monospace,'SF Mono',Menlo,monospace;}

.ol-head{position:relative;padding:48px 28px 36px;border-bottom:1px solid var(--line);overflow:hidden;}
.ol-grid-bg{position:absolute;inset:0;opacity:.5;
  background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:34px 34px;
  -webkit-mask-image:radial-gradient(ellipse 80% 90% at 20% 0%,#000 30%,transparent 75%);
  mask-image:radial-gradient(ellipse 80% 90% at 20% 0%,#000 30%,transparent 75%);}
.ol-eyebrow{position:relative;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.28em;color:var(--green);margin-bottom:14px;text-transform:uppercase;}
.ol-head h1{position:relative;margin:0;font-family:'IBM Plex Mono',monospace;font-weight:600;
  font-size:clamp(34px,7vw,68px);letter-spacing:-.01em;color:#eafff6;line-height:.95;}
.ol-blink{color:var(--green);animation:bl 1.1s steps(1) infinite;}
@keyframes bl{50%{opacity:0;}}
.ol-sub{position:relative;max-width:560px;margin:18px 0 0;color:var(--dim);font-size:15px;line-height:1.55;}

.ol-main{display:grid;grid-template-columns:minmax(0,420px) minmax(0,1fr);gap:0;}
@media(max-width:860px){.ol-main{grid-template-columns:1fr;}}

.ol-panel{padding:28px;border-right:1px solid var(--line);}
@media(max-width:860px){.ol-panel{border-right:none;border-bottom:1px solid var(--line);}}
.ol-panel-title{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--green);margin:0 0 16px;padding-bottom:8px;border-bottom:1px dashed var(--line);}
.ol-panel .ol-panel-title:not(:first-child){margin-top:30px;}

.ol-paste{margin-bottom:22px;border:1px solid var(--line);border-radius:6px;background:var(--ink);}
.ol-paste summary{cursor:pointer;padding:11px 13px;font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--txt);list-style:none;}
.ol-paste summary::-webkit-details-marker{display:none;}
.ol-paste summary:before{content:"+ ";color:var(--green);}
.ol-paste[open] summary:before{content:"\2212 ";}
.ol-paste[open] summary{border-bottom:1px solid var(--line);}
.ol-hint{padding:12px 13px 0;margin:0;font-size:12.5px;color:var(--dim);line-height:1.5;}
.ol-hint code{color:var(--amber);font-size:11.5px;}
.ol-raw{display:block;width:calc(100% - 26px);margin:10px 13px;height:88px;resize:vertical;
  background:var(--panel);border:1px solid var(--line);border-radius:4px;color:var(--txt);
  font-family:'IBM Plex Mono',monospace;font-size:12px;padding:9px;}
.ol-paste .ol-btn{margin:0 13px 13px;}

.ol-fetchrow{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap;}
.ol-select{flex:1;min-width:160px;background:var(--panel);border:1px solid var(--line);border-radius:4px;
  color:var(--txt);font-family:'IBM Plex Mono',monospace;font-size:13px;padding:9px 10px;}

.ol-fields{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.ol-field{display:flex;flex-direction:column;gap:5px;}
.ol-field span{font-size:11px;letter-spacing:.04em;color:var(--dim);text-transform:uppercase;}
.ol-field input{background:var(--panel);border:1px solid var(--line);border-radius:4px;color:var(--txt);
  font-family:'IBM Plex Mono',monospace;font-size:16px;padding:9px 10px;width:100%;}
.ol-field input:focus,.ol-raw:focus,.ol-select:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 1px var(--green);}
.ol-fields .ol-field:first-child,.ol-fields .ol-field:nth-child(2){grid-column:1 / -1;}

.ol-opts{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:end;}
.ol-check{grid-column:1 / -1;display:flex;align-items:center;gap:9px;cursor:pointer;
  font-size:13.5px;color:var(--txt);padding:6px 0;}
.ol-check input{width:17px;height:17px;accent-color:var(--green);}

.ol-btn{appearance:none;border:1px solid var(--green);background:var(--green);color:#04140d;
  font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:13px;letter-spacing:.03em;
  padding:12px 16px;border-radius:5px;cursor:pointer;width:100%;margin-top:18px;transition:.12s;}
.ol-btn:hover{background:#5cf0b6;}
.ol-btn:focus-visible{outline:2px solid #eafff6;outline-offset:2px;}
.ol-btn:disabled{opacity:.5;cursor:wait;}
.ol-btn.ghost{background:transparent;color:var(--green);width:auto;margin:0;padding:8px 14px;}
.ol-btn.ghost:hover{background:rgba(65,224,163,.12);}
.ol-btn.sm{margin-top:0;width:auto;padding:9px 14px;}

.ol-err{margin-top:16px;border-left:3px solid var(--amber);background:rgba(240,180,41,.08);
  color:var(--amber);font-size:13px;padding:9px 12px;border-radius:0 4px 4px 0;}
.ol-note{margin-bottom:18px;border-left:3px solid var(--green);background:rgba(65,224,163,.08);
  color:var(--green);font-size:13px;padding:9px 12px;border-radius:0 4px 4px 0;}

.ol-out{padding:28px;min-width:0;}
.ol-out-head{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;}
.ol-out-actions{display:flex;gap:8px;}
.ol-empty{margin-top:30px;border:1px dashed var(--line);border-radius:6px;padding:40px 24px;
  color:var(--dim);font-size:14px;line-height:1.6;text-align:center;}

.ol-tablewrap{margin-top:6px;border:1px solid var(--line);border-radius:6px;overflow:auto;max-height:620px;}
.ol-table{border-collapse:collapse;width:100%;font-size:13px;}
.ol-table th{position:sticky;top:0;background:var(--panel);text-align:left;
  font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--green);padding:11px 14px;border-bottom:1px solid var(--line);white-space:nowrap;}
.ol-table td{padding:8px 14px;border-bottom:1px solid rgba(29,59,50,.5);white-space:nowrap;}
.ol-table tbody tr:nth-child(even){background:rgba(16,36,32,.5);}
.ol-table tbody tr:hover{background:rgba(65,224,163,.07);}
.ol-table .accent{color:var(--green);}
.ol-table .accent2{color:var(--amber);}

.ol-foot{padding:22px 28px 40px;border-top:1px solid var(--line);color:var(--dim);
  font-size:12.5px;line-height:1.6;max-width:760px;}
</style>
</head>
<body>
<div id="root"></div>

<script src="vendor/react.production.min.js"></script>
<script src="vendor/react-dom.production.min.js"></script>
<script src="app.js"></script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("sw.js").catch(function(){});
  });
}
</script>
</body>
</html>
